<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .box { fill:#f8f9fb; stroke:#333; stroke-width:1.2; rx:6; }
    .title { font: bold 18px sans-serif; fill:#111 }
    .label { font: 14px sans-serif; fill:#222 }
    .pkg { fill:#fff6e6; stroke:#d9a500; stroke-width:1.6; rx:8 }
    .arrow { stroke:#333; stroke-width:1.2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Client Package -->
  <rect x="40" y="40" width="520" height="340" class="pkg" />
  <text x="60" y="68" class="title">Client (React)</text>

  <!-- App and children -->
  <rect x="80" y="100" width="160" height="48" class="box" />
  <text x="100" y="130" class="label">App</text>

  <rect x="260" y="100" width="140" height="48" class="box" />
  <text x="278" y="130" class="label">Header</text>

  <rect x="420" y="100" width="140" height="48" class="box" />
  <text x="440" y="130" class="label">Footer</text>

  <rect x="260" y="170" width="140" height="48" class="box" />
  <text x="282" y="200" class="label">LoginModal</text>

  <rect x="420" y="170" width="160" height="48" class="box" />
  <text x="440" y="200" class="label">ToastStack</text>

  <rect x="80" y="200" width="320" height="48" class="box" />
  <text x="100" y="230" class="label">AppRoutes</text>

  <!-- Pages -->
  <rect x="80" y="270" width="460" height="48" class="box" />
  <text x="100" y="300" class="label">Home / Popular / TopRated / MoviesList / Search / MovieDetail / PersonDetail / Recommendation / Profile</text>

  <!-- TMDB and Server -->
  <rect x="640" y="60" width="480" height="320" class="pkg" />
  <text x="660" y="88" class="title">API / Server</text>

  <rect x="680" y="120" width="180" height="48" class="box" />
  <text x="700" y="150" class="label">TMDB API</text>

  <rect x="880" y="120" width="220" height="48" class="box" />
  <text x="900" y="150" class="label">Server: Auth / Comments / Ratings</text>

  <!-- arrows -->
  <line x1="240" y1="148" x2="270" y2="148" class="arrow" />
  <line x1="360" y1="148" x2="420" y2="148" class="arrow" />
  <line x1="240" y1="248" x2="680" y2="140" class="arrow" />
  <line x1="540" y1="296" x2="680" y2="140" class="arrow" />

  <text x="680" y="460" class="label">Notes: MovieDetail page fetches TMDB (details, credits, images) and calls Server APIs for comments/ratings</text>
</svg>
